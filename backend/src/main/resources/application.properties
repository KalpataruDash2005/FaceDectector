server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:15433/facedetection
spring.datasource.username=faceuser
spring.datasource.password=facepass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.dir=D:/Coading World/face-detection/uploads

app.ai.service.url=http://localhost:18001

logging.level.com.facedetection=INFO
logging.level.org.hibernate.SQL=INFO

